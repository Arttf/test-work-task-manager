<table mat-table [dataSource]="tasks()" class="table" aria-label="Таблица задач">
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef>
      <button class="sort-trigger" type="button" (click)="toggleSort('title')" [class.active]="sortBy() === 'title'">
        <span class="header-label">Задача</span>
        <app-task-sort-indicator [active]="sortBy() === 'title'" [order]="sortOrder()" />
      </button>
    </th>
    <td mat-cell *matCellDef="let task">
      <strong>{{ task.title }}</strong>
      @if (task.description) {
        <div class="sub">{{ task.description }}</div>
      }
    </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>
      <button class="sort-trigger" type="button" (click)="toggleSort('status')" [class.active]="sortBy() === 'status'">
        <span class="header-label">Статус</span>
        <app-task-sort-indicator [active]="sortBy() === 'status'" [order]="sortOrder()" />
      </button>
    </th>
    <td mat-cell *matCellDef="let task">{{ statusLabel(task.status) }}</td>
  </ng-container>

  <ng-container matColumnDef="priority">
    <th mat-header-cell *matHeaderCellDef>
      <button class="sort-trigger" type="button" (click)="toggleSort('priority')" [class.active]="sortBy() === 'priority'">
        <span class="header-label">Приоритет</span>
        <app-task-sort-indicator [active]="sortBy() === 'priority'" [order]="sortOrder()" />
      </button>
    </th>
    <td mat-cell *matCellDef="let task">{{ priorityLabel(task.priority) }}</td>
  </ng-container>

  <ng-container matColumnDef="due_date">
    <th mat-header-cell *matHeaderCellDef>
      <button class="sort-trigger" type="button" (click)="toggleSort('due_date')" [class.active]="sortBy() === 'due_date'">
        <span class="header-label">Дедлайн</span>
        <app-task-sort-indicator [active]="sortBy() === 'due_date'" [order]="sortOrder()" />
      </button>
    </th>
    <td mat-cell *matCellDef="let task">{{ task.due_date ? (task.due_date | date: 'dd.MM.yyyy') : '-' }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Действия</th>
    <td mat-cell *matCellDef="let task" class="actions">
      <button
        mat-icon-button
        color="primary"
        (click)="edit.emit(task)"
        aria-label="Редактировать"
        matTooltip="Редактировать"
      >
        <mat-icon>edit</mat-icon>
      </button>
      <button
        mat-icon-button
        color="warn"
        (click)="remove.emit(task.id)"
        aria-label="Удалить"
        matTooltip="Удалить"
      >
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
